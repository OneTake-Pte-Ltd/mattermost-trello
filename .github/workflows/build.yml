name: build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Determine plugin metadata
        id: meta
        run: |
          PLUGIN_ID=$(python3 -c "import json; print(json.load(open('plugin.json'))['id'])")
          VERSION=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          echo "plugin_id=$PLUGIN_ID" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "bundle_name=${PLUGIN_ID}-${VERSION}.tar.gz" >> $GITHUB_OUTPUT

      - name: Build server binaries
        run: |
          mkdir -p server/dist
          LDFLAGS="-s -w"
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -trimpath -ldflags "$LDFLAGS" -o server/dist/plugin-linux-amd64       ./server
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -trimpath -ldflags "$LDFLAGS" -o server/dist/plugin-linux-arm64       ./server
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -trimpath -ldflags "$LDFLAGS" -o server/dist/plugin-darwin-amd64      ./server
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -trimpath -ldflags "$LDFLAGS" -o server/dist/plugin-darwin-arm64      ./server
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "$LDFLAGS" -o server/dist/plugin-windows-amd64.exe ./server

      - name: Bundle plugin
        run: |
          PLUGIN_ID="${{ steps.meta.outputs.plugin_id }}"
          BUNDLE="${{ steps.meta.outputs.bundle_name }}"
          mkdir -p dist/${PLUGIN_ID}/server
          cp plugin.json dist/${PLUGIN_ID}/
          cp -r assets   dist/${PLUGIN_ID}/
          if [ -d public ]; then cp -r public dist/${PLUGIN_ID}/; fi
          cp -r server/dist dist/${PLUGIN_ID}/server/
          cd dist && tar -czf "../${BUNDLE}" "${PLUGIN_ID}"
          echo "Built: ${BUNDLE}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: "*.tar.gz"
          retention-days: 30

      # On versioned tag pushes: create a proper GitHub release
      - name: Create versioned GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"

      # On master branch pushes: update a rolling "latest" pre-release so
      # users can always download a compiled .tar.gz directly (without the
      # macOS double-extraction problem caused by the Actions artifact zip).
      - name: Update rolling latest pre-release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build (master)"
          prerelease: true
          body: |
            Automated build from the latest commit on `master`.

            **Installation**
            1. Download the `.tar.gz` file below (do **not** use the "Source code" archives — those are auto-generated by GitHub and contain only source, not compiled binaries).
            2. In Mattermost: **System Console → Plugin Management → Upload Plugin** and select the `.tar.gz`.
          files: "*.tar.gz"
